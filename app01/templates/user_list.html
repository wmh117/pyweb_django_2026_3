<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>info_list</h1>
<a href="/useradd">添加用户</a>
<table border="1">
    <thead>
    <tr>
        <th>id</th>
        <th>name</th>
        <th>pwd</th>
        <th>age</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody>
    {% for obj in data %}
         <tr>
            <td>{{obj.id}}</td>
            <td>{{obj.name}}</td>
            <td>{{obj.password}}</td>
            <td>{{obj.age}}</td>
             <td>
                 <a href="http://127.0.0.1:8000/userdelete/?nid={{obj.id}}">删除</a>
             </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

</body>
</html>
